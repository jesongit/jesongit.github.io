        <h1 class="title">多终端编辑 hexo 博客</h1>
        <div class="stuff">
            <span>三月 31, 2020</span>
            
  <ul class="post-tags-list" itemprop="keywords"><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/git/" rel="tag">git</a></li><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/hexo/" rel="tag">hexo</a></li></ul>


        </div>
        <div class="content markdown">
            <blockquote>
<p>  默认已构建好 <code>hexo</code> 博客，此处通过分支对源文件进行管理，也可以另建仓库管理</p>
</blockquote>
<p><strong>配置 <code>.gitignore</code> 文件（可选）</strong></p>
<blockquote>
<p>  出于安全考虑，不上传配置文件</p>
</blockquote>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">.DS_Store</span><br><span class="line">Thumbs.db</span><br><span class="line">db.json</span><br><span class="line">*.log</span><br><span class="line">node_modules&#x2F;</span><br><span class="line">public&#x2F;</span><br><span class="line">.deploy*&#x2F;</span><br><span class="line">_config.yml</span><br></pre></td></tr></table></figure>

<p><strong>重新进行版本控制</strong></p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash"> 注意替换为自己的仓库</span></span><br><span class="line">git init                   # 初始化本地仓库</span><br><span class="line">git add -A                 # 添加本地所有文件到仓库        </span><br><span class="line">git commit -m "blog源文件"  # 添加 commit</span><br><span class="line">git branch hexo            # 创建本地仓库分支 hexo</span><br><span class="line"><span class="meta">#</span><span class="bash"> origin是本地分支,remote add操作会将本地仓库映射到云端</span></span><br><span class="line">git remote add origin git@github.com:jesongit/jesongit.github.io.git</span><br><span class="line">git push origin hexo       # 将本地仓库的源文件推送到远程仓库 hexo 分支</span><br></pre></td></tr></table></figure>

<p><strong>其他终端</strong></p>
<blockquote>
<p>  默认配置好 <code>SSH KEY</code>，安装好 <code>Node.js</code> 等环境</p>
</blockquote>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">git clone -b hexo git@github.com:jesongit/jesongit.github.io.git</span><br><span class="line">cd hexo</span><br><span class="line">npm install</span><br></pre></td></tr></table></figure>

<p><strong>上传源文件</strong></p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">git add *</span><br><span class="line">git commit -m "update"</span><br><span class="line">git push</span><br></pre></td></tr></table></figure>

<p><strong>同步源文件</strong></p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git pull origin hexo</span><br></pre></td></tr></table></figure>
